        /* Marcador de tempo AGORA */
        .current-time-line {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            position: relative;
            z-index: 10;
        }
        .current-time-dot {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }
        .current-time-horizontal {
            flex-grow: 1;
            height: 2px;
            background-color: #ef4444;
        }
        .current-time-label {
            position: absolute;
            left: 22px;
            top: -16px;
            font-size: 10px;
            font-weight: 800;
            color: #ef4444;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal { transition: opacity 0.3s ease; }
        .modal-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.open .modal-content { transform: translateY(0); }

        .touch-target {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .bullet-list {
            list-style-type: none;
            padding: 0;
        }
        .bullet-list li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            line-height: 1.5;
            text-align: left;
        }
        .bullet-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #FFD700;
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1;
        }

            width: 54px;

            background-color: #0c1c38;
            border: 2px solid #FFD700;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        // Funções auxiliares corrigidas
        function getMapsLink(loc) {
            if (!loc) return "#";
            const l = loc.toLowerCase();
            
            // Prioridade para termos específicos
            if (l.includes("residência")) return "https://www.google.com/maps/search/?api=1&query=Rua+Almirante+Dantas+Torres+9+Belem";
            
            // Correção Aeroporto de Belém (Val-de-Cans)
            if (l.includes("aeroporto") && l.includes("belém")) {
                return "https://www.google.com/maps/search/?api=1&query=Aeroporto+Internacional+de+Belém+Val+de+Cans";
            }
            
            if (l.includes("são luiz") || l.includes("são luís")) return "https://www.google.com/maps/search/?api=1&query=Aeroporto+Internacional+de+São+Luís+-+Marechal+Cunha+Machado";
            if (l.includes("hotel premier")) return "https://www.google.com/maps/search/?api=1&query=Hotel+Premier+São+Luís";
            if (l.includes("ufma") || l.includes("prédio histórico") || l.includes("foyer")) return "https://www.google.com/maps/search/?api=1&query=Faculdade+de+Direito+UFMA+São+Luís";
            if (l.includes("fundação memória republicana")) return "https://www.google.com/maps/search/?api=1&query=Fundação+Memória+Republicana+Brasileira";
            if (l.includes("hotel cívico")) return "https://www.google.com/maps/search/?api=1&query=Hotel+Cívico+Parnaíba";
            if (l.includes("companhia porto piauí") || l.includes("cppi")) return "https://www.google.com/maps/search/?api=1&query=Capitania+dos+Portos+do+Piauí";
            if (l.includes("don ladino")) return "https://www.google.com/maps/search/?api=1&query=Restaurante+Don+Ladino+Parnaíba";
            if (l.includes("porto dos tatus")) return "https://www.google.com/maps/search/?api=1&query=Porto+dos+Tatus+Ilha+Grande+Piauí";
            if (l.includes("pedra do sal")) return "https://www.google.com/maps/search/?api=1&query=Praia+da+Pedra+do+Sal+Parnaíba";
            if (l.includes("pizzaria paulistana")) return "https://www.google.com/maps/search/?api=1&query=Pizzaria+Paulistana+Parnaíba";
            if (l.includes("teresina")) return "https://www.google.com/maps/search/?api=1&query=Aeroporto+de+Teresina";
            if (l.includes("fortaleza")) return "https://www.google.com/maps/search/?api=1&query=Aeroporto+Internacional+de+Fortaleza";
            
            // Fallback genérico para Belém (Comando do 4º Distrito Naval)
            if (l.includes("belém")) return "https://www.google.com/maps/search/?api=1&query=Comando+do+4º+Distrito+Naval+Belém";

            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`;
        }

        function getSpeakerPhoto(speaker) {
            if (!speaker) return '';

            return img;

                { id: "e54", time: "10h00", title: "Chegada ao Aeroporto de Teresina - PI", loc: "Aeroporto de Teresina", uni: "Passeio", desc: "Voo LAN LAN 3492 Localizador: AAHZSR\nVoo LAN LAN 3524 Localizador: AAHZSR" },
                { id: "e55", time: "12h15", title: "Decolagem voo LAN LAN3492", loc: "Aeroporto de Teresina", uni: "Passeio", flight: "LAN3492", type: "plane", desc: "Voo THE (12h15) x FOR (13h25). Localizador: AAHZSR" },
                { id: "e56", time: "14h30", title: "Decolagem voo LAN LAN3524", loc: "Aeroporto Fortaleza", uni: "Passeio", flight: "LAN3524", type: "plane", desc: "Voo FOR (14h30) x BEL (16h30). Localizador: AAHZSR" },
                { id: "e57", time: "16h30", title: "Chegada ao Aeroporto de Belém", loc: "Aeroporto de Belém", uni: "Passeio", type: "clock", desc: "Fim do programa oficial de viagem." }
            ]}
        ];

        const logistics = {
            vtrs: [ { auth: "DN-02 / Comitiva", model: "Toyota Yaris", plate: "SZM-9A22", mot: "A definir", tel: "91900000000" } ],
            convidados: [
                { n: "Dr. Péricles Aurélio Lima de Queiroz", f: "Ministro do STM e Diretor da ENAJUM", l: "Brasília-DF", p: "Seminário", img: "Pericles.png" },
                { n: "Dr. Clauro Roberto de Bortolli", f: "Procurador-Geral de Justiça Militar", l: "Brasília-DF", p: "Seminário", img: "Clauro.png" },
                { n: "Gen. Bda. ROBERVAL DE ALMEIDA", f: "Comandante da 22ª Brigada de Infantaria de Selva", l: "Maranhão", p: "Seminário", img: "Roberval.png" },
                { n: "C. Alte. José Fabio Carneiro da Silva", f: "Chefe do Estado-Maior do Com4ºDN", l: "Belém-PA", p: "Seminário", img: "Jose.png" }
            ],
            contatos: [
                { superHeader: "MARANHÃO" },
                { name: "CMG Simões (CPMA)", role: "Comandante", phone: "98991446833" },
                { name: "Hotel Premier", role: "Recepção", phone: "9832140000" },
                { header: "PIAUÍ" },
                { name: "CF Ricardo Ferreira (CPPI)", role: "Capitão dos Portos", phone: "86981403299" },
                { name: "Hotel Cívico", role: "Recepção Parnaíba", phone: "8633230000" }
            ]
        };

        function init() {
            const tabs = document.getElementById('tab-container');
            const container = document.getElementById('events-container');
            if(!tabs || !container) return;

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            let initialIdx = schedule.findIndex(s => s.date === todayStr);
            if (initialIdx === -1) initialIdx = 0;

            tabs.innerHTML = '';
            container.innerHTML = '';

            schedule.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${idx === initialIdx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
                btn.innerText = day.label;
                btn.onclick = () => switchTab(idx);
                tabs.appendChild(btn);

                const div = document.createElement('div');
                div.id = `day-${idx}`;
                div.className = `tab-content ${idx === initialIdx ? 'active' : ''}`;
                
                day.events.forEach(ev => {
                    let iconClass = "fa-clock";
                    if (ev.type === 'plane') iconClass = "fa-plane";
                    else if (ev.type === 'car') iconClass = "fa-car";
                    else if (ev.type === 'boat') iconClass = "fa-ship";

                    const hasFlightCard = ev.type === 'plane' && ev.flight;

                    div.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative w-full event-card" data-time="${ev.time}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-2 text-navy">
                                    <i class="fas ${iconClass} text-gold text-sm"></i>
                                    <span class="text-2xl font-black tracking-tight">${ev.time}</span>
                                </div>
                                <div class="flex gap-2 items-center">
                                    ${hasFlightCard ? `<button onclick="showBoardingPass('${ev.flight}')" class="text-blue-600 bg-blue-50 px-3 py-2 rounded-xl text-[10px] font-bold border border-blue-100"><i class="fas fa-search mr-1"></i> LOCALIZADOR</button>` : ''}
                                    <span onclick="openModal('uniformes'); event.stopPropagation();" class="bg-slate-50 text-slate-500 text-[10px] font-bold px-3 py-2 rounded-xl uppercase border border-slate-200">${ev.uni}</span>
                                </div>
                            </div>
                            <h4 class="font-extrabold text-slate-800 text-[18px] leading-tight mb-1 pr-12 text-left">${ev.title}</h4>
                            ${ev.theme ? `<p class="text-xs text-slate-500 font-medium italic mb-1 text-left">"${ev.theme}"</p>` : ''}
                            ${ev.speaker ? `<p class="text-[11px] text-slate-400 font-bold uppercase mb-4 text-left">${ev.speaker}</p>` : '<div class="mb-5"></div>'}
                            
                            <div class="flex flex-col gap-3">
                                <a href="${getMapsLink(ev.loc)}" target="_blank" class="text-[14px] text-blue-600 font-bold inline-flex items-center gap-2.5 bg-slate-50 rounded-2xl px-4 w-fit border border-slate-100 text-left">
                                    <i class="fas fa-location-dot text-gold"></i> ${ev.loc}
                                </a>
                                ${hasFlightCard ? `<button onclick="searchFlight('${ev.flight}')" class="touch-target w-full bg-navy text-white text-xs font-bold rounded-2xl"><i class="fas fa-plane-departure text-gold mr-2"></i> RASTREAR VOO ${ev.flight}</button>` : ''}
                            </div>
                            <button onclick="showEventInfo('${ev.id}')" class="absolute top-14 right-6 text-gold p-2 active:scale-90 transition-transform"><i class="fas fa-circle-info text-3xl"></i></button>
                        </div>`;
                });
                container.appendChild(div);
            });
            updateIndicator();
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const target = document.getElementById(`day-${idx}`);
            if(target) target.classList.add('active');
            
            const btns = document.getElementById('tab-container').children;
            for(let i=0; i<btns.length; i++) {
                btns[i].className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${i === idx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updateIndicator();
        }

        function searchFlight(code) {
            window.open(`https://pt.flightaware.com/live/flight/${code.toUpperCase()}`, '_blank');
        }

        window.showBoardingPass = function(flightCode) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Localizador";
            const isAzul = flightCode.startsWith('AZU') || flightCode.startsWith('AD');
            const loc = isAzul ? 'HLP5WJ' : 'AAHZSR';
            const ciaName = isAzul ? 'AZUL' : 'LATAM';
            const ciaClass = isAzul ? 'pass-azu' : 'pass-lan';
            const bgClass = isAzul ? 'bg-azu' : 'bg-lan';

            // Mapeamento de siglas de aeroportos
            let siglaOrig = "ORIG";
            let siglaDest = "DEST";

            if (flightCode.includes('2620')) {
                siglaOrig = "BEL"; siglaDest = "SLZ";
            } else if (flightCode.includes('3492')) {
                siglaOrig = "THE"; siglaDest = "FOR";
            } else if (flightCode.includes('3524')) {
                siglaOrig = "FOR"; siglaDest = "BEL";
            }

            body.innerHTML = `
                <div class="boarding-pass ${ciaClass}">
                    <div class="pass-header ${bgClass} flex justify-between items-center text-left">
                        <div>
                            <p class="text-[9px] uppercase opacity-70 font-bold">Passageiro</p>
                            <p class="font-extrabold text-sm uppercase text-white">SILVA / JOSÉ FÁBIO CARNEIRO DA</p>
                        </div>
                        <p class="font-black text-white text-xs">${ciaName}</p>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-6">
                            <div class="text-center">
                                <p class="text-3xl font-black text-navy">${siglaOrig}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">Origem</p>
                            </div>
                            <i class="fas fa-plane text-slate-200"></i>
                            <div class="text-center">
                                <p class="text-3xl font-black text-navy">${siglaDest}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">Destino</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-slate-50 pt-4 text-left">
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Voo</p><p class="font-black text-navy">${flightCode}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Loc</p><p class="font-black text-navy">${loc}</p></div>
                        </div>
                    </div>
                </div>`;
            openModalWindow();
        };

        window.showEventInfo = function(eventId) {
            let event = null;
            schedule.forEach(day => { const found = day.events.find(e => e.id === eventId); if(found) event = found; });
            if(!event) return;
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Informações";
            
            let speakerInfo = null;
            if (event.speaker) {
                const searchName = event.speaker.toUpperCase().trim();
                speakerInfo = logistics.convidados.find(c => {
                    const normalizedC = c.n.toUpperCase().trim();
                    return searchName.includes(normalizedC) || normalizedC.includes(searchName);
                });
            }

            let formattedDesc = "Nenhuma observação constante no programa.";
            if(event.desc) {
                const lines = event.desc.split('\n').filter(l => l.trim() !== "");
                formattedDesc = `<ul class="bullet-list">` + lines.map(line => `<li>${line.trim()}</li>`).join('') + `</ul>`;
            }

            body.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between">
                        <div class="text-left"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Hora Local</p><span class="text-navy font-black text-lg">${event.time}</span></div>
                        <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Uniforme</p><span class="bg-navy text-white px-4 py-1.5 rounded-xl font-bold text-[11px] uppercase">${event.uni}</span></div>
                    </div>
                    ${speakerInfo ? `
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm text-center">
                        <div class="photo-frame-lg">
                            <img src="${getSpeakerPhoto(speakerInfo)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(speakerInfo.n)}&background=0c1c38&color=FFD700&bold=true'" alt="${speakerInfo.n}">
                        </div>
                        <p class="text-[11px] font-bold text-gold uppercase tracking-widest mb-1">Palestrante</p>
                        <h5 class="text-lg font-black text-navy uppercase leading-tight">${speakerInfo.n}</h5>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 leading-tight">${speakerInfo.f}</p>
                    </div>
                    ` : ''}
                    <div class="text-left">
                        <p class="text-[11px] font-bold text-slate-400 uppercase mb-1">Atividade</p>
                        <p class="text-2xl font-extrabold text-navy leading-tight mb-2">${event.title}</p>
                        ${event.theme ? `<p class="text-sm text-slate-600 italic font-medium mb-4">"${event.theme}"</p>` : ''}
                    </div>
                    ${event.desc ? `
                    <div class="bg-white p-6 rounded-[32px] border-l-8 border-gold shadow-sm">
                        <p class="text-[11px] font-bold text-gold uppercase mb-4 tracking-widest text-left">Observações</p>
                        <div class="text-slate-700 font-medium">${formattedDesc}</div>
                    </div>
                    ` : ''}
                </div>`;
            openModalWindow();
        };

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let content = "";
            if (type === 'uniformes') {
                document.getElementById('modal-title').innerText = "Uniformes";
                const unis = [
                    { t: "5.5 - Branco de Verão", d: "Palestras e eventos formais diurnos." },
                    { t: "5.3 - Dolmã (com barretas)", d: "Cerimônia de outorga de medalhas." },
                    { t: "OP3", d: "Uniforme operativo / Viagens terrestres." },
                    { t: "Esporte Amazônico", d: "Eventos sociais e jantares." },
                    { t: "Passeio", d: "Traje civil formal para voos." }
                ];
                unis.forEach(u => content += `<div class="bg-white p-5 rounded-2xl border border-slate-100 mb-4 text-left"><p class="font-extrabold text-navy uppercase text-xs mb-1">${u.t}</p><p class="text-sm text-slate-600">${u.d}</p></div>`);
            } else if (type === 'convidados') {
                document.getElementById('modal-title').innerText = "Palestrantes";
                logistics.convidados.forEach(h => {
                    content += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 mb-4 flex gap-4 items-center text-left">
                        <div class="photo-frame">
                            <img src="${getSpeakerPhoto(h)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(h.n)}&background=0c1c38&color=FFD700&bold=true'" alt="${h.n}">
                        </div>
                        <div class="flex-grow">
                            <p class="font-bold text-navy text-sm uppercase leading-tight">${h.n}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${h.f}</p>
                        </div>
                    </div>`;
                });
            } else if (type === 'motoristas') {
                document.getElementById('modal-title').innerText = "Viaturas";
                logistics.vtrs.forEach(v => content += `<div class="bg-white p-5 rounded-2xl border border-slate-100 mb-4 text-left"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Apoio à Comitiva</p><p class="text-base font-extrabold text-navy uppercase">${v.model} - ${v.plate}</p></div>`);
            } else if (type === 'telefones') {
                document.getElementById('modal-title').innerText = "Contatos";
                content = `<div class="bg-white rounded-3xl overflow-hidden text-left">`;
                logistics.contatos.forEach(t => {
                    if (t.superHeader) {
                        content += `<div class="bg-navy p-3 text-gold text-center font-black text-[10px] uppercase">${t.superHeader}</div>`;
                    } else if (t.header) {
                        content += `<div class="bg-slate-50 p-2 pl-4 text-navy font-bold text-[9px] uppercase border-y">${t.header}</div>`;
                    } else {
                        const cleanPhone = t.phone.replace(/\D/g, '');
                        const isHotel = t.name.toLowerCase().includes('hotel');
                        content += `
                        <div class="p-4 border-b border-slate-50 flex justify-between items-center">
                            <div class="text-left">
                                <p class="font-bold text-sm text-slate-800 uppercase">${t.name}</p>
                                <p class="text-[10px] text-slate-400 uppercase">${t.role}</p>
                            </div>
                            <div class="flex gap-2">
                                <a href="tel:${t.phone}" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-navy hover:bg-navy hover:text-white transition-colors">
                                    <i class="fas fa-phone-alt"></i>
                                </a>
                                ${!isHotel ? `
                                <a href="https://wa.me/55${cleanPhone}" target="_blank" class="w-10 h-10 bg-whatsapp/10 rounded-full flex items-center justify-center text-whatsapp hover:bg-whatsapp hover:text-white transition-colors">
                                    <i class="fab fa-whatsapp text-lg"></i>
                                </a>` : ''}
                            </div>
                        </div>`;
                    }
                });
                content += "</div>";
            } else if (type === 'estadia') {
                document.getElementById('modal-title').innerText = "Hospedagem";
                const locais = [{n: "Hotel Premier", d: "São Luís - MA."}, {n: "Hotel Cívico", d: "Parnaíba - PI."}];
                locais.forEach(l => content += `<div class="bg-white p-5 rounded-2xl border border-slate-100 mb-4 text-left"><p class="font-bold text-navy uppercase text-sm">${l.n}</p><p class="text-xs text-slate-500">${l.d}</p></div>`);
            }
            body.innerHTML = content;
            openModalWindow();
        }

        function openModalWindow() { 
            const m = document.getElementById('info-modal'); 
            m.classList.remove('hidden'); 
            setTimeout(() => m.classList.add('open'), 10); 
        }
        function closeModal() { 
            const m = document.getElementById('info-modal'); 
            m.classList.remove('open'); 
            setTimeout(() => m.classList.add('hidden'), 300); 
        }

        function updateIndicator() {
            document.querySelectorAll('.current-time-line').forEach(l => l.remove());
            const activeTab = document.querySelector('.tab-content.active');
            if(!activeTab) return;
            const activeIdx = parseInt(activeTab.id.split('-')[1]);
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            if (schedule[activeIdx].date !== todayStr) return;

            const timeNowMinutes = today.getHours() * 60 + today.getMinutes();
            const timeLabel = `${String(today.getHours()).padStart(2, '0')}:${String(today.getMinutes()).padStart(2, '0')}`;
            const cards = activeTab.querySelectorAll('.event-card');
            let inserted = false;
            const timelineHTML = `<div class="current-time-line"><span class="current-time-label">AGORA (${timeLabel})</span><div class="current-time-dot"></div><div class="current-time-horizontal"></div></div>`;

            for (let i = 0; i < cards.length; i++) {
                const cardTime = cards[i].getAttribute('data-time');
                const match = cardTime.match(/(\d+)h(\d*)/);
                if (!match) continue;
                const cardMinutes = parseInt(match[1]) * 60 + parseInt(match[2] || 0);
                if (cardMinutes > timeNowMinutes) {
                    cards[i].insertAdjacentHTML('beforebegin', timelineHTML);
                    inserted = true;
                    break;
                }
            }
            if (!inserted && cards.length > 0) cards[cards.length - 1].insertAdjacentHTML('afterend', timelineHTML);
        }
        
        window.onload = init;
    </script>
</body>
</html>
