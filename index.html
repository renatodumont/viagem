        body {

        .glass-header {

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Marcador de tempo AGORA (Azul Marinho) */
        .current-time-line {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            position: relative;
            z-index: 10;
        }
        .current-time-dot {
            width: 12px;
            height: 12px;
            background: #0c1c38;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 0 4px rgba(12, 28, 56, 0.2);
            animation: pulse 2s infinite;
        }
        .current-time-horizontal {
            flex-grow: 1;
            height: 2px;
            background-color: #0c1c38;
        }
        .current-time-label {
            position: absolute;
            left: 22px;
            top: -16px;
            font-size: 10px;
            font-weight: 800;
            color: #0c1c38;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal { transition: opacity 0.3s ease; }
        .modal-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.open .modal-content { transform: translateY(0); }

        .touch-target {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Estilos Localizador (Sem Vermelho) */
        .boarding-pass {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            margin: 0 auto;
        }
        .pass-azu { border-top: 8px solid #002D5E; }
        .pass-lan { border-top: 8px solid #1e293b; }

        .pass-header {
            padding: 20px;
            color: white;
        }
        .bg-azu { background-color: #002D5E; }
        .bg-lan { background-color: #1e293b; }

        .pass-cut {
            border-top: 2px dashed #e2e8f0;
            margin: 10px 0;
            position: relative;
        }
        .pass-cut::before, .pass-cut::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #f3f4f6;
            border-radius: 50%;
            top: -11px;
        }
        .pass-cut::before { left: -10px; }
        .pass-cut::after { right: -10px; }

        .photo-frame {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: #e2e8f0;
            border: 2px solid #FFD700;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-frame-lg {
            width: 80px;

            border-radius: 50%;
            background-color: #e2e8f0;
            border: 3px solid #FFD700;
            overflow: hidden;
            display: flex;

            justify-content: center;
            margin: 0 auto 1rem;
        }
        .photo-frame-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>

                { id: "e52", time: "04h30", title: "Check-out", loc: "Hotel Cívico", uni: "Passeio", desc: "Participantes: DN-02, CP-01\nViatura: Yaris" },
                { id: "e53", time: "05h00", title: "Deslocamento para Aeroporto", loc: "Trânsito para Teresina", uni: "Passeio", type: "car", desc: "Tempo Médio de deslocamento: 5h" },
                { id: "e54", time: "10h00", title: "Chegada ao Aeroporto de Teresina - PI", loc: "Aeroporto de Teresina", uni: "Passeio", desc: "Voo LAN LAN 3492 Localizador: AAHZSR\nVoo LAN LAN 3524 Localizador: AAHZSR" },
                { id: "e55", time: "12h15", title: "Decolagem voo LAN LAN3492", loc: "Aeroporto de Teresina", uni: "Passeio", flight: "LAN3492", type: "plane", desc: "Voo THE (12h15) x FOR (13h25). Localizador: AAHZSR" },
                { id: "e56", time: "14h30", title: "Decolagem voo LAN LAN3524", loc: "Aeroporto Fortaleza", uni: "Passeio", flight: "LAN3524", type: "plane", desc: "Voo FOR (14h30) x BEL (16h30). Localizador: AAHZSR" },
                { id: "e57", time: "16h30", title: "Chegada ao Aeroporto de Belém", loc: "Aeroporto de Belém", uni: "Passeio", type: "clock", desc: "Fim do programa oficial de viagem." }
            ]}
        ];

        const logistics = {
            vtrs: [
                { auth: "DN-02 / Comitiva", model: "Toyota Yaris", plate: "SZM-9A22", mot: "A definir", tel: "91900000000", stay: "Hotel Premier / Hotel Cívico" }
            ],
            convidados: [
                { n: "Dr. Péricles Aurélio Lima de Queiroz", f: "Ministro do STM e Diretor da ENAJUM", l: "Brasília-DF", p: "Seminário", img: "Pericles.png" },
                { n: "Dr. Clauro Roberto de Bortolli", f: "Procurador-Geral de Justiça Militar", l: "Brasília-DF", p: "Seminário", img: "Clauro.png" },
                { n: "Gen. Bda. Roberval de Almeida", f: "Comandante da 22ª Brigada de Infantaria de Selva", l: "Maranhão", p: "Seminário", img: "Roberval.png" },
                { n: "Prof Dr Márcia Haydée Porto de Carvalho", f: "Promotora de Justiça e Coord. PPGDIR/UFMA", l: "Maranhão", p: "Seminário", img: "Marcia.png" },
                { n: "Dr. Diogo Gualhardo Neves", f: "Assessor Jurídico-Chefe da PJM de São Luís/MA", l: "Maranhão", p: "Seminário", img: "Diogo.png" }
            ],
            contatos: [
                { superHeader: "MARANHÃO" },
                { name: "PJM - São Luís/MA", role: "Sede Administrativa", phone: "9832210000" },
                { name: "CMG Simões (CPMA)", role: "Comandante", phone: "98991446833" },
                { name: "Hotel Premier", role: "Recepção", phone: "9832140000" },
                { header: "PIAUÍ" },
                { name: "CF RICARDO FERREIRA (CPPI)", role: "Capitão dos Portos", phone: "86981403299" },
                { name: "CPPI", role: "Capitania dos Portos", phone: "8633210000" },
                { name: "Hotel Cívico", role: "Recepção Parnaíba", phone: "8633230000" }
            ]
        };

        // --- INTERFACE PRINCIPAL ---
        function init() {
            const tabs = document.getElementById('tab-container');
            const container = document.getElementById('events-container');
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            let initialIdx = schedule.findIndex(s => s.date === todayStr);
            if (initialIdx === -1) initialIdx = 0;

            schedule.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${idx === initialIdx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
                btn.innerText = day.label;
                btn.onclick = () => switchTab(idx);
                tabs.appendChild(btn);

                const div = document.createElement('div');
                div.id = `day-${idx}`;
                div.className = `tab-content ${idx === initialIdx ? 'active' : ''}`;
                
                day.events.forEach(ev => {
                    let iconClass = "fa-clock";
                    if (ev.type === 'plane') iconClass = "fa-plane";
                    else if (ev.type === 'car') iconClass = "fa-car";
                    else if (ev.type === 'boat') iconClass = "fa-ship";

                    const mapsUrl = getMapsLink(ev.loc);

                    // Só mostra o botão do localizador se tiver o código do voo definido (exceto e57)
                    const hasFlightCard = ev.type === 'plane' && ev.flight && ev.id !== 'e57';

                    div.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative w-full event-card" data-time="${ev.time}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-2 text-navy">
                                    <i class="fas ${iconClass} text-gold text-sm"></i>
                                    <span class="text-2xl font-black tracking-tight">${ev.time}</span>
                                </div>
                                <div class="flex gap-2 items-center text-left">
                                    ${hasFlightCard ? `<button onclick="showBoardingPass('${ev.flight}')" class="text-blue-600 bg-blue-50 px-3 py-2 rounded-xl text-[10px] font-bold border border-blue-100 hover:bg-blue-100 transition-colors"><i class="fas fa-search mr-1"></i> LOCALIZADOR</button>` : ''}
                                    <span onclick="openModal('uniformes'); event.stopPropagation();" class="uniform-badge bg-slate-50 text-slate-500 text-[10px] font-bold px-3 py-2 rounded-xl uppercase border border-slate-200">${ev.uni}</span>
                                </div>
                            </div>
                            <h4 class="font-extrabold text-slate-800 text-[18px] leading-tight mb-1 pr-12 text-left">${ev.title}</h4>
                            ${ev.theme ? `<p class="text-xs text-slate-500 font-medium italic mb-1 text-left">"${ev.theme}"</p>` : ''}
                            ${ev.speaker ? `<p class="text-[11px] text-slate-400 font-bold uppercase mb-4 text-left">${ev.speaker}</p>` : '<div class="mb-5"></div>'}
                            
                            <div class="flex flex-col gap-3">
                                <a href="${mapsUrl}" target="_blank" class="text-[14px] text-blue-600 font-bold inline-flex items-center gap-2.5 bg-slate-50 rounded-2xl px-4 w-fit border border-slate-100 text-left">
                                    <i class="fas fa-location-dot text-gold"></i> ${ev.loc}
                                </a>
                                ${ev.flight && ev.id !== 'e57' ? `<button onclick="searchFlight('${ev.flight}')" class="touch-target w-full bg-navy text-white text-xs font-bold rounded-2xl active:scale-95 transition-transform"><i class="fas fa-plane-departure text-gold mr-2"></i> RASTREAR VOO ${ev.flight}</button>` : ''}
                            </div>
                            <button onclick="showEventInfo('${ev.id}')" class="absolute top-14 right-6 text-gold p-2 active:scale-90 transition-transform"><i class="fas fa-circle-info text-3xl"></i></button>
                        </div>`;
                });
                container.appendChild(div);
            });
            updateIndicator();
            setInterval(updateIndicator, 60000);
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`day-${idx}`).classList.add('active');
            const btns = document.getElementById('tab-container').children;
            for(let i=0; i<btns.length; i++) btns[i].className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${i === idx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updateIndicator();
        }

        function searchFlight(code) {
            window.open(`https://pt.flightaware.com/live/flight/${code.toUpperCase()}`, '_blank');
        }

        window.showBoardingPass = function(flightCode) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Localizador";
            
            const isAzul = flightCode.startsWith('AZU');
            const loc = isAzul ? 'HLP5WJ' : 'AAHZSR';
            const ciaClass = isAzul ? 'pass-azu' : 'pass-lan';
            const bgClass = isAzul ? 'bg-azu' : 'bg-lan';
            const ciaName = isAzul ? 'AZUL' : 'LATAM';

            let origin = 'BEL';
            let dest = 'SLZ';
            if (flightCode.includes('3492')) { origin = 'THE'; dest = 'FOR'; }
            if (flightCode.includes('3524')) { origin = 'FOR'; dest = 'BEL'; }

            body.innerHTML = `
                <div class="boarding-pass ${ciaClass}">
                    <div class="pass-header ${bgClass} flex justify-between items-center text-left">
                        <div>
                            <p class="text-[9px] uppercase opacity-70 font-bold">Passageiro</p>
                            <p class="font-extrabold text-sm">SILVA / JOSÉ FÁBIO CARNEIRO DA</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[10px] font-black text-white">${ciaName}</p>
                             <i class="fas fa-plane text-gold text-xl"></i>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-6">
                            <div class="text-center">
                                <p class="text-3xl font-black text-navy">${origin}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">Origem</p>
                            </div>
                            <div class="flex-grow border-b-2 border-slate-100 mx-4 relative">
                                <i class="fas fa-plane absolute top-[-10px] left-1/2 -translate-x-1/2 text-slate-200"></i>
                            </div>
                            <div class="text-center">
                                <p class="text-3xl font-black text-navy">${dest}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">Destino</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 border-t border-slate-50 pt-4 text-left">
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Voo</p><p class="font-black text-navy">${flightCode}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Localizador</p><p class="font-black text-navy">${loc}</p></div>
                            <div><p class="text-[9px] text-slate-400 font-bold uppercase">Assento</p><p class="font-black text-navy">Prefer.</p></div>
                        </div>
                    </div>
                    <div class="pass-cut"></div>
                    <div class="p-6 bg-slate-50 flex flex-col items-center">
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest text-center">Fins Operativos</p>
                    </div>
                </div>
            `;
            openModalWindow();
        };

        window.showEventInfo = function(eventId) {
            let event = null;
            schedule.forEach(day => { const found = day.events.find(e => e.id === eventId); if(found) event = found; });
            if(!event) return;
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Minuta Detalhada";
            
            // Busca palestrante na lista de convidados para exibir foto e cargo
            let speakerInfo = null;
            if (event.speaker) {
                speakerInfo = logistics.convidados.find(c => c.n.toUpperCase().includes(event.speaker.split(' ').pop().toUpperCase()) || event.speaker.includes(c.n));
            }

            body.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between">
                        <div class="text-left"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1 text-left">Hora Local</p><span class="text-navy font-black text-lg"><i class="fas fa-clock text-gold mr-2"></i>${event.time}</span></div>
                        <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1 text-right">Uniforme</p><span class="bg-navy text-white px-4 py-1.5 rounded-xl font-bold text-[11px] uppercase">${event.uni}</span></div>
                    </div>

                    ${speakerInfo ? `
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm text-center">
                        <div class="photo-frame-lg">
                            <img src="${speakerInfo.img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(speakerInfo.n)}&background=0c1c38&color=FFD700'" alt="${speakerInfo.n}">
                        </div>
                        <p class="text-[11px] font-bold text-gold uppercase tracking-widest mb-1">Palestrante</p>
                        <h5 class="text-lg font-black text-navy uppercase leading-tight">${speakerInfo.n}</h5>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 leading-tight">${speakerInfo.f}</p>
                    </div>
                    ` : ''}

                    <div class="text-left">
                        <p class="text-[11px] font-bold text-slate-400 uppercase mb-1 text-left">Atividade</p>
                        <p class="text-2xl font-extrabold text-navy leading-tight mb-2 text-left">${event.title}</p>
                        ${event.theme ? `<p class="text-sm text-slate-600 italic font-medium text-left">"${event.theme}"</p>` : ''}
                        ${event.speaker && !speakerInfo ? `<p class="font-bold text-navy uppercase text-sm mt-2 text-left">${event.speaker}</p>` : ''}
                    </div>
                    
                    <div class="bg-white p-6 rounded-[32px] border-l-8 border-gold shadow-sm">
                        <p class="text-[11px] font-bold text-gold uppercase mb-4 tracking-widest text-left">Observações Transcritas</p>
                        <div class="text-[15px] leading-relaxed font-medium text-slate-700 text-left whitespace-pre-wrap">
                            ${event.desc || 'Nenhuma observação constante no cronograma oficial.'}
                        </div>
                    </div>
                </div>`;
            openModalWindow();
        };

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let content = "";
            if (type === 'uniformes') {
                document.getElementById('modal-title').innerText = "Descrição de Uniformes";
                const unis = [
                    { t: "Passeio", d: "Utilização durante as viagens em voos comerciais." },
                    { t: "5.5 - Branco de Verão", d: "Utilização durante o ciclo de palestras dos dias 29 e 30ABR." },
                    { t: "5.3 - Dolmã (com barretas)", d: "Será utilizado na cerimônia de Outorga das comendas da Ordem do Mérito do Ministério Público Militar (OMMPM)" },
                    { t: "OP3", d: "Será utilizado durante a visita à CPPI" },
                    { t: "Esporte Amazônico", d: "Eventos sociais." }
                ];
                unis.forEach(u => content += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 text-left"><p class="font-extrabold text-navy mb-2 text-xs uppercase tracking-widest border-b pb-2 text-left">${u.t}</p><p class="text-[15px] text-slate-600 font-medium text-left">${u.d}</p></div>`);
            } else if (type === 'convidados') {
                document.getElementById('modal-title').innerText = "Palestrantes e Convidados";
                logistics.convidados.forEach(h => content += `
                    <div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 flex gap-4 items-center text-left">
                        <div class="photo-frame">
                            <img src="${h.img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(h.n)}&background=0c1c38&color=FFD700'" alt="${h.n}">
                        </div>
                        <div class="flex-grow">
                            <p class="font-bold text-navy text-base uppercase leading-tight text-left">${h.n}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 leading-tight text-left">${h.f}</p>
                            <div class="flex items-center gap-3 mt-2">
                                <span class="text-[8px] font-black bg-gold/10 text-navy px-2 py-0.5 rounded-md uppercase tracking-tighter">${h.p}</span>
                                <span class="text-[9px] font-bold text-slate-400 italic"><i class="fas fa-location-dot mr-1"></i>${h.l}</span>
                            </div>
                        </div>
                    </div>`);
            } else if (type === 'motoristas') {
                document.getElementById('modal-title').innerText = "Logística de Viaturas";
                logistics.vtrs.forEach(v => content += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 text-left"><p class="text-[10px] font-extrabold text-navy/40 uppercase mb-1 text-left">Apoio à Comitiva</p><p class="text-base font-extrabold text-navy uppercase mb-4 text-left">${v.mot}</p><div class="bg-slate-50 p-4 rounded-2xl mb-4 text-left"><p class="text-[13px] text-navy font-bold flex items-center gap-3"><i class="fas fa-car-side"></i> ${v.model} | Placa: ${v.plate}</p></div><a href="tel:${v.tel.replace(/\D/g,'')}" class="touch-target w-full bg-navy text-white text-xs font-bold rounded-2xl shadow-sm text-center flex items-center justify-center"><i class="fas fa-phone-alt mr-2 text-gold"></i> Chamar Motorista</a></div>`);
            } else if (type === 'telefones') {
                document.getElementById('modal-title').innerText = "Contatos Operacionais";
                content = `<div class="bg-white rounded-[32px] overflow-hidden text-left">`;
                logistics.contatos.forEach(t => {
                    if (t.superHeader) content += `<div class="bg-navy p-4 text-gold text-center font-extrabold text-[10px] uppercase tracking-widest">${t.superHeader}</div>`;
                    else if (t.header) content += `<div class="bg-slate-50 p-2 pl-6 text-navy font-bold text-[9px] uppercase border-y text-left">${t.header}</div>`;
                    else content += `<div class="p-5 border-b border-slate-50 flex justify-between items-center bg-white"><div class="flex-grow pr-4 text-left"><p class="font-bold text-base text-slate-800 uppercase leading-tight text-left">${t.name}</p><p class="text-[11px] text-slate-400 font-bold uppercase mt-1 text-left">${t.role}</p></div><a href="tel:${t.phone.replace(/\D/g,'')}" class="touch-target bg-slate-100 text-navy p-4 rounded-full w-12 h-12 flex items-center justify-center"><i class="fas fa-phone-alt"></i></a></div>`;
                });
                content += "</div>";
            } else if (type === 'estadia') {
                document.getElementById('modal-title').innerText = "Locais de Hospedagem";
                const locais = [{n: "Hotel Premier (São Luís)", d: "Av. dos Holandeses, Ponta d'Areia. São Luís - MA."}, {n: "Hotel Cívico (Parnaíba)", d: "Av. Pres. Vargas, 303 - Centro, Parnaíba - PI."}];
                locais.forEach(l => content += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 text-left"><p class="font-bold text-navy uppercase text-sm mb-2 text-left">${l.n}</p><p class="text-[13px] text-slate-600 font-medium text-left">${l.d}</p></div>`);
            }
            body.innerHTML = content;
            openModalWindow();
        }

        function openModalWindow() { const m = document.getElementById('info-modal'); m.classList.remove('hidden'); setTimeout(() => m.classList.add('open'), 10); }
        function closeModal() { const m = document.getElementById('info-modal'); m.classList.remove('open'); setTimeout(() => m.classList.add('hidden'), 300); }

        function updateIndicator() {
            document.querySelectorAll('.current-time-line').forEach(l => l.remove());
            const activeTab = document.querySelector('.tab-content.active');
            if(!activeTab) return;
            const activeIdx = activeTab.id.split('-')[1];
            const today = new Date();
            const tabDate = schedule[activeIdx].date;
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            if (tabDate !== todayStr) return;

            const timeNowMinutes = today.getHours() * 60 + today.getMinutes();
            const timeLabel = `${String(today.getHours()).padStart(2, '0')}:${String(today.getMinutes()).padStart(2, '0')}`;
            const cards = activeTab.querySelectorAll('.event-card');
            let inserted = false;
            const timelineHTML = `<div class="current-time-line"><span class="current-time-label">AGORA (${timeLabel})</span><div class="current-time-dot"></div><div class="current-time-horizontal"></div></div>`;

            for (let i = 0; i < cards.length; i++) {
                const cardTime = cards[i].getAttribute('data-time');
                if (cardTime === "ASD") continue;
                const match = cardTime.match(/(\d+)h(\d*)/);
                if (!match) continue;
                const cardMinutes = parseInt(match[1]) * 60 + parseInt(match[2] || 0);
                if (cardMinutes > timeNowMinutes) {
                    cards[i].insertAdjacentHTML('beforebegin', timelineHTML);
                    inserted = true;
                    break;
                }
            }
            if (!inserted && cards.length > 0) cards[cards.length - 1].insertAdjacentHTML('afterend', timelineHTML);
        }
        
        window.onload = init;
    </script>
</body>
</html>
