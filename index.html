    <style>
        body {
            background-color: #f3f4f6;
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
            font-size: 16px;
        }

        .glass-header {
            background: rgba(12, 28, 56, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Indicador de tempo "Google Agenda" */
        .current-time-line {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            position: relative;
            z-index: 10;
        }
        .current-time-dot {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }
        .current-time-horizontal {
            flex-grow: 1;
            height: 2px;
            background-color: #ef4444;
        }
        .current-time-label {
            position: absolute;
            left: 22px;
            top: -16px;
            font-size: 10px;
            font-weight: 800;
            color: #ef4444;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal { transition: opacity 0.3s ease; }
        .modal-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.open .modal-content { transform: translateY(0); }

        .touch-target {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .uniform-badge {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .uniform-badge:active {
            transform: scale(0.92);
            background-color: #e2e8f0;
        }

        /* Foto Placeholder */
        .photo-frame {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: #e2e8f0;
            border: 2px solid #FFD700;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>

        // --- CORE UI ---
        function init() {
            const tabs = document.getElementById('tab-container');
            const container = document.getElementById('events-container');
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            let initialIdx = schedule.findIndex(s => s.date === todayStr);
            if (initialIdx === -1) initialIdx = 0;

            schedule.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${idx === initialIdx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
                btn.innerText = day.label;
                btn.onclick = () => switchTab(idx);
                tabs.appendChild(btn);

                const div = document.createElement('div');
                div.id = `day-${idx}`;
                div.className = `tab-content ${idx === initialIdx ? 'active' : ''}`;
                
                day.events.forEach(ev => {
                    let iconClass = "fa-clock";
                    if (ev.type === 'plane') iconClass = "fa-plane";
                    else if (ev.type === 'car') iconClass = "fa-car";
                    else if (ev.type === 'boat') iconClass = "fa-ship";

                    const mapsUrl = getMapsLink(ev.loc);

                    div.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative w-full event-card" data-time="${ev.time}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-2 text-navy">
                                    <i class="fas ${iconClass} text-gold text-sm"></i>
                                    <span class="text-2xl font-black tracking-tight">${ev.time}</span>
                                </div>
                                <span onclick="openModal('uniformes'); event.stopPropagation();" class="uniform-badge bg-slate-50 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-xl uppercase border border-slate-200">${ev.uni}</span>
                            </div>
                            <h4 class="font-extrabold text-slate-800 text-[18px] leading-tight mb-1 pr-12 text-left">${ev.title}</h4>
                            ${ev.theme ? `<p class="text-xs text-slate-500 font-medium italic mb-1 text-left">"${ev.theme}"</p>` : ''}
                            ${ev.speaker ? `<p class="text-[11px] text-slate-400 font-bold uppercase mb-4 text-left">${ev.speaker}</p>` : '<div class="mb-5"></div>'}
                            
                            <div class="flex flex-col gap-3">
                                <a href="${mapsUrl}" target="_blank" class="text-[14px] text-blue-600 font-bold inline-flex items-center gap-2.5 bg-slate-50 rounded-2xl px-4 w-fit border border-slate-100 text-left">
                                    <i class="fas fa-location-dot text-gold"></i> ${ev.loc}
                                </a>
                                ${ev.flight ? `<button onclick="searchFlight('${ev.flight}')" class="touch-target w-full bg-navy text-white text-xs font-bold rounded-2xl active:scale-95 transition-transform"><i class="fas fa-plane-departure text-gold mr-2"></i> RASTREAR VOO ${ev.flight}</button>` : ''}
                            </div>
                            <button onclick="showEventInfo('${ev.id}')" class="absolute top-14 right-6 text-gold p-2 active:scale-90 transition-transform"><i class="fas fa-circle-info text-3xl"></i></button>
                        </div>`;
                });
                container.appendChild(div);
            });
            updateIndicator();
            setInterval(updateIndicator, 60000);
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`day-${idx}`).classList.add('active');
            const btns = document.getElementById('tab-container').children;
            for(let i=0; i<btns.length; i++) btns[i].className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${i === idx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updateIndicator();
        }

        function searchFlight(code) {
            window.open(`https://pt.flightaware.com/live/flight/${code.toUpperCase()}`, '_blank');
        }

        window.showEventInfo = function(eventId) {
            let event = null;
            schedule.forEach(day => { const found = day.events.find(e => e.id === eventId); if(found) event = found; });
            if(!event) return;
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Programa Detalhado";
            
            let rawDesc = event.desc || 'Informações conforme Programa oficial.';
            let finalOutputHtml = "";

            if (rawDesc.includes(':')) {
                const colonIndex = rawDesc.indexOf(':');
                const label = rawDesc.substring(0, colonIndex).trim();
                const namesPart = rawDesc.substring(colonIndex + 1).trim();

                const listItems = namesPart
                    .replace(/ e /g, ',')
                    .split(',')
                    .map(name => name.trim().replace(/\.$/, ""))
                    .filter(name => name.length > 0)
                    .map(name => `<li class="ml-4 list-disc">${name}</li>`)
                    .join('');

                finalOutputHtml = `
                    <p class="font-bold mb-2 text-left">${label}:</p>
                    <ul class="space-y-1.5 text-left">${listItems}</ul>
                `;
            } else {
                finalOutputHtml = `<p class="text-[15px] leading-relaxed text-slate-700 font-medium text-left">${rawDesc}</p>`;
            }

            body.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Hora Local</p><span class="text-navy font-black text-lg"><i class="fas fa-clock text-gold mr-2"></i>${event.time}</span></div>
                        <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Uniforme</p><span class="bg-navy text-white px-4 py-1.5 rounded-xl font-bold text-[11px] uppercase">${event.uni}</span></div>
                    </div>
                    <div class="text-left text-left">
                        <p class="text-[11px] font-bold text-slate-400 uppercase mb-1">Atividade</p>
                        <p class="text-2xl font-extrabold text-navy leading-tight mb-2">${event.title}</p>
                        ${event.theme ? `<p class="text-sm text-slate-600 italic font-medium">"${event.theme}"</p>` : ''}
                    </div>
                    <div class="bg-white p-6 rounded-[32px] border-l-8 border-gold shadow-sm">
                        <p class="text-[11px] font-bold text-gold uppercase mb-4 tracking-widest text-left text-left">Observações</p>
                        ${event.speaker ? `<p class="font-bold mb-3 text-navy text-left text-lg">Palestrante: <br><span class="font-medium text-slate-600 text-sm">${event.speaker}</span></p>` : ''}
                        <div class="text-[15px] leading-relaxed text-slate-700 font-medium text-left text-left">
                            ${finalOutputHtml}
                        </div>
                    </div>
                </div>`;
            openModalWindow();
        };

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let content = "";
            if (type === 'uniformes') {
                document.getElementById('modal-title').innerText = "Uniforme / Traje";
                const unis = [{ t: "OP3", d: "Uniforme Operativo Azul-Ferrete (com Boné de Viagem)." }, { t: "Passeio", d: "Calça e Camisa social, Blazer (sem gravata)." }, { t: "Esporte Amazônico", d: "Calça social, Camisa polo e Sapato." }, { t: "5.3 / 5.5", d: "Uniforme de Gala / Social da Marinha do Brasil." }];
                unis.forEach(u => content += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 text-left"><p class="font-extrabold text-navy mb-2 text-xs uppercase tracking-widest border-b pb-2">${u.t}</p><p class="text-[15px] text-slate-600 font-medium text-left">${u.d}</p></div>`);
            } else if (type === 'convidados') {
                document.getElementById('modal-title').innerText = "Convidados do Seminário";
                logistics.convidados.forEach(h => content += `
                    <div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 flex gap-4 items-center text-left">
                        <div class="photo-frame">
                            <img src="${h.img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(h.n)}&background=0c1c38&color=FFD700'" alt="${h.n}">
                        </div>
                        <div class="flex-grow">
                            <p class="font-bold text-navy text-base uppercase leading-tight">${h.n}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 leading-tight">${h.f}</p>
                            <div class="mt-2 text-[9px] font-black text-gold uppercase tracking-tighter">${h.p}</div>
                        </div>
                    </div>`);
            } else if (type === 'motoristas') {
                document.getElementById('modal-title').innerText = "Logística de Viaturas";
                logistics.vtrs.forEach(v => content += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 text-left"><p class="text-[10px] font-extrabold text-navy/40 uppercase mb-1">${v.auth}</p><p class="text-base font-extrabold text-navy uppercase mb-4">${v.mot}</p><div class="bg-slate-50 p-4 rounded-2xl mb-4 text-left"><p class="text-[13px] text-navy font-bold flex items-center gap-3"><i class="fas fa-car-side"></i> ${v.model} | ${v.plate}</p></div><a href="tel:${v.tel.replace(/\D/g,'')}" class="touch-target w-full bg-navy text-white text-xs font-bold rounded-2xl shadow-sm"><i class="fas fa-phone-alt mr-2 text-gold"></i> Chamar Motorista</a></div>`);
            } else if (type === 'telefones') {
                document.getElementById('modal-title').innerText = "Contatos Operacionais";
                content = `<div class="bg-white rounded-[32px] overflow-hidden">`;
                logistics.contatos.forEach(t => {
                    if (t.superHeader) content += `<div class="bg-navy p-4 text-gold text-center font-extrabold text-[10px] uppercase tracking-widest">${t.superHeader}</div>`;
                    else if (t.header) content += `<div class="bg-slate-50 p-2 pl-6 text-navy font-bold text-[9px] uppercase border-y text-left">${t.header}</div>`;
                    else content += `<div class="p-5 border-b border-slate-50 flex justify-between items-center bg-white"><div class="flex-grow pr-4 text-left"><p class="font-bold text-base text-slate-800 uppercase leading-tight">${t.name}</p><p class="text-[11px] text-slate-400 font-bold uppercase mt-1 text-left">${t.role}</p></div><a href="tel:${t.phone.replace(/\D/g,'')}" class="touch-target bg-slate-100 text-navy p-4 rounded-full w-12 h-12 flex items-center justify-center"><i class="fas fa-phone-alt"></i></a></div>`;
                });
                content += "</div>";
            } else if (type === 'estadia') {
                document.getElementById('modal-title').innerText = "Hospedagem";
                const locais = [{n: "Hotel Premier (São Luís)", d: "Av. dos Holandeses, Ponta d'Areia."}, {n: "Hotel Cívico (Parnaíba)", d: "Av. Pres. Vargas, 303 - Centro, Parnaíba - PI."}];
                locais.forEach(l => content += `<div class="bg-white p-5 rounded-[24px] border border-slate-100 mb-4 text-left"><p class="font-bold text-navy uppercase text-sm mb-2 text-left">${l.n}</p><p class="text-[13px] text-slate-600 font-medium text-left">${l.d}</p></div>`);
            }
            body.innerHTML = content;
            openModalWindow();
        }

        function openModalWindow() { const m = document.getElementById('info-modal'); m.classList.remove('hidden'); setTimeout(() => m.classList.add('open'), 10); }
        function closeModal() { const m = document.getElementById('info-modal'); m.classList.remove('open'); setTimeout(() => m.classList.add('hidden'), 300); }

        function updateIndicator() {
            document.querySelectorAll('.current-time-line').forEach(l => l.remove());
            const activeTab = document.querySelector('.tab-content.active');
            if(!activeTab) return;
            const activeIdx = activeTab.id.split('-')[1];
            
            const today = new Date();
            const tabDate = schedule[activeIdx].date;
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            if (tabDate !== todayStr) return;

            const timeNowMinutes = today.getHours() * 60 + today.getMinutes();
            const timeLabel = `${String(today.getHours()).padStart(2, '0')}:${String(today.getMinutes()).padStart(2, '0')}`;
            const cards = activeTab.querySelectorAll('.event-card');
            let inserted = false;
            const timelineHTML = `<div class="current-time-line"><span class="current-time-label">AGORA (${timeLabel})</span><div class="current-time-dot"></div><div class="current-time-horizontal"></div></div>`;

            for (let i = 0; i < cards.length; i++) {
                const cardTime = cards[i].getAttribute('data-time');
                if (cardTime === "ASD") continue;
                const match = cardTime.match(/(\d+)h(\d*)/);
                if (!match) continue;
                const cardMinutes = parseInt(match[1]) * 60 + parseInt(match[2] || 0);
                if (cardMinutes > timeNowMinutes) {
                    cards[i].insertAdjacentHTML('beforebegin', timelineHTML);
                    inserted = true;
                    break;
                }
            }
            if (!inserted && cards.length > 0) cards[cards.length - 1].insertAdjacentHTML('afterend', timelineHTML);
        }
        
        window.onload = init;
    </script>
</body>
</html>
