    <style>
        body {
            background-color: #f3f4f6;
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
            font-size: 16px;
        }

        .glass-header {
            background: rgba(12, 28, 56, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .current-time-line {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            position: relative;
            z-index: 10;
        }
        .current-time-dot {
            width: 12px;
            height: 12px;
            background: #0c1c38;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 0 4px rgba(12, 28, 56, 0.2);
            animation: pulse 2s infinite;
        }
        .current-time-horizontal {
            flex-grow: 1;
            height: 2px;
            background-color: #0c1c38;
        }
        .current-time-label {
            position: absolute;
            left: 22px;
            top: -16px;
            font-size: 10px;
            font-weight: 800;
            color: #0c1c38;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal { transition: opacity 0.3s ease; }
        .modal-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.open .modal-content { transform: translateY(0); }

        .touch-target {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .boarding-pass {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            margin: 0 auto;
        }
        .pass-azu { border-top: 8px solid #002D5E; }
        .pass-lan { border-top: 8px solid #1e293b; }

        .pass-header {
            padding: 20px;
            color: white;
        }
        .bg-azu { background-color: #002D5E; }
        .bg-lan { background-color: #1e293b; }

        .pass-cut {
            border-top: 2px dashed #e2e8f0;
            margin: 10px 0;
            position: relative;
        }
        .pass-cut::before, .pass-cut::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #f3f4f6;
            border-radius: 50%;
            top: -11px;
        }
        .pass-cut::before { left: -10px; }
        .pass-cut::after { right: -10px; }

        .photo-frame {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: #e2e8f0;
            border: 2px solid #FFD700;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-frame-lg {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #e2e8f0;
            border: 3px solid #FFD700;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .photo-frame-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Estilo para os bullets na descrição */
        .desc-list {
            list-style-type: none;
            padding: 0;
        }
        .desc-list li {
            position: relative;
            padding-left: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .desc-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #FFD700;
            font-weight: bold;
        }
    </style>
